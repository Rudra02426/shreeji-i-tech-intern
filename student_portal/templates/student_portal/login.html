{% load static %}
<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login - Student Portal</title>

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Poppins', 'sans-serif'],
          },
        },
      },
    }
  </script>
</head>

<body class="bg-green-50 flex flex-col items-center justify-center h-screen font-sans">

  <!-- Login Card -->
  <div class="bg-white p-8 rounded-xl shadow-lg w-full max-w-md">

    <h1 class="text-3xl font-bold mb-6 text-green-600 text-center">
      Login
    </h1>

    <form method="POST" class="space-y-4">
      {% csrf_token %}

      <div>
        <label class="block font-semibold mb-1">Username</label>
        <input type="text" name="username"
               class="w-full border rounded-md p-3 focus:outline-none focus:ring-2 focus:ring-green-500"
               placeholder="Enter username" required>
      </div>

      <div>
        <label class="block font-semibold mb-1">Password</label>
        <input type="password" name="password"
               class="w-full border rounded-md p-3 focus:outline-none focus:ring-2 focus:ring-green-500"
               placeholder="Enter password" required>
      </div>

      <button type="submit"
              class="w-full bg-green-600 text-white py-3 rounded-full font-semibold hover:bg-green-700 transition">
        Login
      </button>
    </form>

    {% if error %}
      <p class="text-red-500 mt-4 text-center">
        {{ error }}
      </p>
    {% endif %}

  </div>

  <!-- Back Button -->
  <div class="mt-6">
    <a href="{% url 'portal_home' %}"
       class="inline-block px-6 py-2 bg-gray-600 text-white rounded-full hover:bg-gray-700 transition">
      ← Back to Home
    </a>
  </div>

</body>
</html>
