<!DOCTYPE html>
<html lang="en">
<head>
    <title>User Registration</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-green-50 flex items-center justify-center h-screen">

    <div class="bg-white shadow-lg rounded-xl p-8 w-96">

        <h2 class="text-3xl font-bold text-center text-green-600 mb-6">
            User Registration
        </h2>

        <form method="post">
            {% csrf_token %}
            <div class="space-y-4">
                {{ form.as_p }}
            </div>

            <button type="submit"
                class="w-full bg-green-600 text-white py-3 rounded hover:bg-green-700 mt-4 transition">
                Register
            </button>
        </form>

        <p class="text-center mt-6">
            Already have an account?
            <a href="{% url 'user_login' %}" class="text-green-600 font-semibold">
                Login
            </a>
        </p>

    </div>

</body>
</html>
